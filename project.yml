name: AgentSkillManager
options:
  bundleIdPrefix: ai.gowtam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

packages:
  swift-cmark:
    url: https://github.com/apple/swift-cmark
    branch: gfm

settings:
  base:
    SWIFT_VERSION: "6"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AgentSkillManager:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: swift-cmark
        product: cmark-gfm
      - package: swift-cmark
        product: cmark-gfm-extensions
    resources:
      - path: Sources/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.gowtam.agent-skill-manager
        PRODUCT_NAME: "Agent Skill Manager"
        PRODUCT_MODULE_NAME: AgentSkillManager
        INFOPLIST_FILE: Sources/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets:
        - AgentSkillManagerTests

  AgentSkillManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: AgentSkillManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.gowtam.agent-skill-manager-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Agent Skill Manager.app/Contents/MacOS/Agent Skill Manager"
        BUNDLE_LOADER: "$(TEST_HOST)"
